name: felicitup_app
description: 'A new Flutter project.'

version: 1.0.21+80
environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Graphics
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  animate_do: ^4.2.0
  flutter_svg: ^2.2.3
  phosphor_flutter: ^2.1.0
  shimmer: ^3.0.0

  # State Management
  bloc: ^9.2.0
  hydrated_bloc: ^10.1.1
  flutter_bloc: ^9.1.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase
  collection: ^1.19.1
  cloud_firestore: ^6.2.0
  cloud_functions: ^6.1.0
  firebase_analytics: ^12.2.0
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  firebase_crashlytics: ^5.1.0
  firebase_messaging: ^16.1.3
  firebase_storage: ^13.2.0
  firebase_remote_config: ^6.3.0

  # Facebook / Meta SDK
  facebook_app_events: ^0.24.0

  # Packages
  android_intent_plus: ^6.0.0
  either_dart: ^1.0.0
  fast_contacts: ^5.0.1
  flutter_local_notifications: ^21.0.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  go_router: ^17.1.0
  google_sign_in: ^7.2.0
  intl: ^0.20.2
  intl_utils: ^2.8.13
  intl_mobile_field: ^2.1.4
  json_annotation: ^4.9.0
  envied: ^1.3.2
  sign_in_with_apple: ^7.0.1
  app_tracking_transparency: ^2.0.6+1
  sms_autofill: ^2.4.1
  package_info_plus: ^9.0.1
  uuid: ^4.5.2
  version: ^3.0.2

  # Utils
  crypto: ^3.0.7
  email_validator: ^3.0.0
  http: ^1.6.0
  string_similarity: ^2.1.1
  image_picker: ^1.2.1
  logger: ^2.7.0
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  pin_code_fields: ^8.0.1
  super_tooltip: ^2.1.1
  url_launcher: ^6.3.1
  video_player: ^2.10.1

dev_dependencies:
  build_runner: ^2.4.9
  custom_lint: ^0.8.1
  envied_generator: ^1.3.2
  flutter_gen_runner: ^5.12.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/on_boarding/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 500

flutter_intl:
  enabled: true
  class_name: IntlTrans
  main_locale: es
  arb_dir: lib/l10n
  output_dir: lib/gen

flutter_gen:
  output: lib/gen

flutter_launcher_icons:
  android: 'launcher_icon'
  ios: true
  image_path: 'assets/images/icon.png'
  min_sdk_android: 21
